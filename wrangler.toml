# Cloudflare Pages 配置
# Pages Functions 模式: functions/api/* 自动成为 /api/* 路由
name = "limit-startup"

# Pages 静态资源构建输出 (根目录 = 当前)
pages_build_output_dir = "."

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "limit-startup-db"
database_id = "de871d75-01ee-4fbc-a7af-62fddb23e6ff"

# KV namespace 限流 (注册 / 登录 / 改密)
[[kv_namespaces]]
binding = "RL"
id = "6c19b13174d24705a21ac436c1ccc4cd"

# 头像走 D1 base64 (方案 C, 不需要 R2)
# 环境变量 (在 Cloudflare Pages 后台设置, 不入 git):
#   JWT_SECRET        - 32 位以上强随机串
#   TURNSTILE_SECRET  - Cloudflare Turnstile secret key
#   ALLOWED_ORIGIN    - 生产域 https://www.demisse.cn
